<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Telegram dry-run connector</title>
  <desc id="desc">Telegram connector prepares request payload first and sends only after explicit approval.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.head{font:800 48px Inter,Arial,sans-serif}.h{font:800 32px Inter,Arial,sans-serif}.p{font:500 24px Inter,Arial,sans-serif}.mono{font:700 21px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:5;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="720" rx="32"/>
  <text x="72" y="94" class="head ink">Telegram connector: preview first</text>
  <text x="74" y="140" class="p muted">live demo по умолчанию не делает внешних мутаций</text>
  <g transform="translate(100 245)"><rect class="box" width="260" height="230" rx="28"/><circle cx="70" cy="72" r="28" class="cool"/><rect x="42" y="124" width="174" height="38" rx="19" fill="#fff"/><rect x="92" y="174" width="128" height="38" rx="19" fill="#ffe1cf"/><text x="42" y="270" class="h ink">Telegram</text></g>
  <path class="line" marker-end="url(#a)" d="M380 360h110"/>
  <g transform="translate(510 260)"><rect class="cool" width="320" height="200" rx="18"/><text x="30" y="58" class="h ink">dry_run=True</text><text x="30" y="108" class="p muted">method: sendMessage</text><text x="30" y="148" class="p muted">chat_id + text</text></g>
  <path class="line" marker-end="url(#a)" d="M850 360h110"/>
  <g transform="translate(980 260)"><rect class="hot" width="320" height="200" rx="18"/><text x="30" y="58" class="h ink">Human gate</text><text x="30" y="108" class="p muted">проверить payload</text><text x="30" y="148" class="p muted">потом разрешить send</text></g>
</svg>
