<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Deep Agent anatomy</title>
  <desc id="desc">Deep Agent pieces: model, instructions, tools, files, subagents, planning loop.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.dark{fill:#15130f}.rev{fill:#fffaf1}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 30px Inter,Arial,sans-serif}.p{font:500 23px Inter,Arial,sans-serif}.line{stroke:#201d19;stroke-width:4;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="760" rx="32"/>
  <text x="72" y="92" class="head ink">Deep Agent: не одна функция</text>
  <text x="74" y="138" class="p muted">тот же класс runtime, на котором можно объяснять Claude Code и SWE</text>
  <g transform="translate(535 285)"><rect class="dark" width="330" height="180" rx="24"/><text x="44" y="78" class="h rev">Planning loop</text><text x="44" y="122" class="p rev">observe → act</text><text x="44" y="154" class="p rev">check</text></g>
  <path class="line" marker-end="url(#a)" d="M535 335H360"/><path class="line" marker-end="url(#a)" d="M535 420H360"/><path class="line" marker-end="url(#a)" d="M865 335h175"/><path class="line" marker-end="url(#a)" d="M865 420h175"/>
  <g transform="translate(110 255)"><rect class="box" width="270" height="120" rx="18"/><text x="28" y="52" class="h ink">Instructions</text><text x="28" y="88" class="p muted">policy + style</text></g>
  <g transform="translate(110 420)"><rect class="cool" width="270" height="120" rx="18"/><text x="28" y="52" class="h ink">Files</text><text x="28" y="88" class="p muted">read / edit</text></g>
  <g transform="translate(1040 255)"><rect class="hot" width="250" height="120" rx="18"/><text x="28" y="52" class="h ink">Tools</text><text x="28" y="88" class="p muted">API actions</text></g>
  <g transform="translate(1040 420)"><rect class="box" width="250" height="120" rx="18"/><text x="28" y="52" class="h ink">Subagents</text><text x="28" y="88" class="p muted">specialists</text></g>
</svg>
