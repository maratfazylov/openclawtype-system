<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw story</title>
  <desc id="desc">OpenClaw as a messenger-first agent runtime idea.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.dark{fill:#15130f}.rev{fill:#fffaf1}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 32px Inter,Arial,sans-serif}.p{font:500 24px Inter,Arial,sans-serif}.mono{font:700 21px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:5;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="760" rx="32"/>
  <text x="72" y="92" class="head ink">OpenClaw: величие UX</text>
  <text x="74" y="138" class="p muted">написал в мессенджер → агент сделал работу → вернул результат</text>
  <g transform="translate(92 255)"><rect class="cool" width="270" height="180" rx="22"/><text x="30" y="62" class="h ink">Message API</text><text x="30" y="108" class="p muted">role + content</text><text x="30" y="146" class="p muted">простой вход</text></g>
  <path class="line" marker-end="url(#a)" d="M380 345h120"/>
  <g transform="translate(520 225)"><rect class="dark" width="330" height="240" rx="24"/><text x="32" y="70" class="h rev">Agent runtime</text><text x="32" y="118" class="p rev">tools</text><text x="32" y="154" class="p rev">state</text><text x="32" y="190" class="p rev">loop</text></g>
  <path class="line" marker-end="url(#a)" d="M870 345h120"/>
  <g transform="translate(1010 255)"><rect class="hot" width="300" height="180" rx="22"/><text x="30" y="62" class="h ink">Result</text><text x="30" y="108" class="p muted">файл · статус</text><text x="30" y="146" class="p muted">короткий ответ</text></g>
  <g transform="translate(120 548)"><rect class="box" width="1160" height="100" rx="20"/><text x="34" y="43" class="h ink">Главная идея</text><text x="34" y="76" class="p muted">не новый чат, а канал к автономному рабочему контуру</text></g>
</svg>
