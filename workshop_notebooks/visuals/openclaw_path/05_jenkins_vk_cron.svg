<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Jenkins and VK bridge</title>
  <desc id="desc">Jenkins connector, VK connector and polling bridge with cron-like loop.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.dark{fill:#15130f}.rev{fill:#fffaf1}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 30px Inter,Arial,sans-serif}.p{font:500 23px Inter,Arial,sans-serif}.mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:4;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="760" rx="32"/>
  <text x="72" y="92" class="head ink">Jenkins + VK: real connectors</text>
  <text x="74" y="138" class="p muted">Jenkins действует по gate; VK приходит через polling bridge</text>
  <g transform="translate(95 250)"><rect class="hot" width="290" height="170" rx="20"/><text x="30" y="58" class="h ink">Jenkins</text><text x="30" y="102" class="p muted">job info</text><text x="30" y="136" class="p muted">build preview</text></g>
  <g transform="translate(95 490)"><rect class="cool" width="290" height="170" rx="20"/><text x="30" y="58" class="h ink">VK API</text><text x="30" y="102" class="p muted">messages.send</text><text x="30" y="136" class="p muted">dry-run first</text></g>
  <path class="line" marker-end="url(#a)" d="M405 335h145"/><path class="line" marker-end="url(#a)" d="M405 575h145"/>
  <g transform="translate(570 355)"><rect class="dark" width="300" height="200" rx="22"/><text x="32" y="66" class="h rev">LangGraph</text><text x="32" y="110" class="p rev">thread + run</text><text x="32" y="146" class="p rev">assistant id</text></g>
  <path class="line" marker-end="url(#a)" d="M890 455h130"/>
  <g transform="translate(1040 355)"><rect class="box" width="310" height="200" rx="22"/><text x="30" y="58" class="h ink">Polling</text><text x="30" y="102" class="mono accent">every 5 sec</text><text x="30" y="140" class="p muted">seen state</text><text x="30" y="174" class="p muted">optional reply</text></g>
</svg>
