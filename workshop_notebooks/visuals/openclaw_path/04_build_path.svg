<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Interactive OpenClaw build path</title>
  <desc id="desc">Five-step build path for the OpenClaw clone.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 28px Inter,Arial,sans-serif}.p{font:500 22px Inter,Arial,sans-serif}.mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:4;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="760" rx="32"/>
  <text x="72" y="92" class="head ink">Интерактивная сборка OpenClaw</text>
  <text x="74" y="138" class="p muted">каждый notebook добавляет один слой runtime</text>
  <path class="line" marker-end="url(#a)" d="M208 380h985"/>
  <g transform="translate(74 278)"><rect class="box" width="210" height="190" rx="18"/><text x="26" y="52" class="mono accent">01</text><text x="26" y="96" class="h ink">Minimal</text><text x="26" y="130" class="p muted">messages</text><text x="26" y="160" class="p muted">agent</text></g>
  <g transform="translate(326 278)"><rect class="cool" width="220" height="190" rx="18"/><text x="26" y="52" class="mono teal">02</text><text x="26" y="96" class="h ink">Files</text><text x="26" y="130" class="p muted">workspace</text><text x="26" y="160" class="p muted">shell gate</text></g>
  <g transform="translate(578 278)"><rect class="hot" width="220" height="190" rx="18"/><text x="26" y="52" class="mono accent">03</text><text x="26" y="96" class="h ink">Jenkins</text><text x="26" y="130" class="p muted">metadata</text><text x="26" y="160" class="p muted">build gate</text></g>
  <g transform="translate(830 278)"><rect class="cool" width="210" height="190" rx="18"/><text x="26" y="52" class="mono teal">04</text><text x="26" y="96" class="h ink">VK</text><text x="26" y="130" class="p muted">messages</text><text x="26" y="160" class="p muted">bridge</text></g>
  <g transform="translate(1082 278)"><rect class="box" width="240" height="190" rx="18"/><text x="26" y="52" class="mono accent">05</text><text x="26" y="96" class="h ink">Subagents</text><text x="26" y="130" class="p muted">skills</text><text x="26" y="160" class="p muted">SWE mode</text></g>
</svg>
