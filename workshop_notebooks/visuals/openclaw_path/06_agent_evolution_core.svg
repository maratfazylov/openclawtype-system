<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Agent system evolution</title>
  <desc id="desc">Three contracts: LLM, coding agent, messenger-first agent.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.dark{fill:#15130f}.rev{fill:#fffaf1}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 31px Inter,Arial,sans-serif}.p{font:500 23px Inter,Arial,sans-serif}.mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:4;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="760" rx="32"/>
  <text x="72" y="92" class="head ink">Три контракта агентной системы</text>
  <text x="74" y="138" class="p muted">от функции текста к среде выполнения и постоянному каналу</text>
  <g transform="translate(78 245)"><rect class="box" width="360" height="260" rx="22"/><text x="30" y="58" class="mono accent">01</text><text x="30" y="104" class="h ink">LLM</text><text x="30" y="152" class="p muted">prompt</text><path class="line" marker-end="url(#a)" d="M118 145h82"/><text x="225" y="152" class="p muted">text</text><text x="30" y="210" class="p muted">нет среды</text></g>
  <g transform="translate(520 245)"><rect class="cool" width="360" height="260" rx="22"/><text x="30" y="58" class="mono teal">02</text><text x="30" y="104" class="h ink">Claude Code</text><text x="30" y="152" class="p muted">goal → loop</text><text x="30" y="190" class="p muted">tools → repo</text><text x="30" y="228" class="p muted">developer workspace</text></g>
  <g transform="translate(962 245)"><rect class="hot" width="360" height="260" rx="22"/><text x="30" y="58" class="mono accent">03</text><text x="30" y="104" class="h ink">OpenClaw</text><text x="30" y="152" class="p muted">message → gateway</text><text x="30" y="190" class="p muted">loop → tools</text><text x="30" y="228" class="p muted">external world</text></g>
  <g transform="translate(160 575)"><rect class="dark" width="1080" height="112" rx="20"/><text x="34" y="48" class="h rev">Агент появляется там, где есть цикл,</text><text x="34" y="86" class="h rev">состояние, tools и runtime</text></g>
</svg>
