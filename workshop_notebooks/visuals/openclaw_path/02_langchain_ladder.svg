<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">LangChain to Deep Agents</title>
  <desc id="desc">Progression from LangChain to LangGraph to Deep Agents.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 32px Inter,Arial,sans-serif}.p{font:500 24px Inter,Arial,sans-serif}.mono{font:700 21px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:5;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="760" rx="32"/>
  <text x="72" y="92" class="head ink">LangChain → LangGraph → Deep Agents</text>
  <text x="74" y="138" class="p muted">идем от model calls к управляемому runtime</text>
  <g transform="translate(90 265)"><rect class="box" width="300" height="210" rx="22"/><text x="32" y="66" class="mono accent">01</text><text x="32" y="115" class="h ink">LangChain</text><text x="32" y="158" class="p muted">model + tools</text></g>
  <path class="line" marker-end="url(#a)" d="M410 370h105"/>
  <g transform="translate(535 265)"><rect class="cool" width="300" height="210" rx="22"/><text x="32" y="66" class="mono teal">02</text><text x="32" y="115" class="h ink">LangGraph</text><text x="32" y="158" class="p muted">state + edges</text></g>
  <path class="line" marker-end="url(#a)" d="M855 370h105"/>
  <g transform="translate(980 265)"><rect class="hot" width="330" height="210" rx="22"/><text x="32" y="66" class="mono accent">03</text><text x="32" y="115" class="h ink">Deep Agents</text><text x="32" y="158" class="p muted">files + planning</text></g>
</svg>
