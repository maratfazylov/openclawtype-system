<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw gateway architecture</title>
  <desc id="desc">Messenger channels go through gateway into sessions, agent loop, memory, tools and external capabilities.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.dark{fill:#15130f}.rev{fill:#fffaf1}.head{font:800 52px Inter,Arial,sans-serif}.h{font:800 30px Inter,Arial,sans-serif}.p{font:500 23px Inter,Arial,sans-serif}.mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:4;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="820" rx="32"/>
  <text x="72" y="92" class="head ink">OpenClaw: channel ≠ agent</text>
  <text x="74" y="138" class="p muted">мессенджер только transport; Gateway связывает канал, сессию и runtime</text>
  <g transform="translate(80 225)"><rect class="cool" width="300" height="170" rx="20"/><text x="30" y="58" class="h ink">Channels</text><text x="30" y="100" class="p muted">WhatsApp</text><text x="30" y="132" class="p muted">Telegram · Slack</text></g>
  <path class="line" marker-end="url(#a)" d="M400 310h120"/>
  <g transform="translate(540 205)"><rect class="dark" width="320" height="210" rx="24"/><text x="34" y="66" class="h rev">Gateway</text><text x="34" y="110" class="p rev">routing</text><text x="34" y="144" class="p rev">sessions</text><text x="34" y="178" class="p rev">tool policy</text></g>
  <path class="line" marker-end="url(#a)" d="M880 310h120"/>
  <g transform="translate(1020 225)"><rect class="hot" width="300" height="170" rx="20"/><text x="30" y="58" class="h ink">Agent loop</text><text x="30" y="100" class="p muted">messages + state</text><text x="30" y="132" class="p muted">planning + tools</text></g>
  <path class="line" marker-end="url(#a)" d="M700 430v80"/>
  <g transform="translate(220 555)"><rect class="box" width="260" height="140" rx="18"/><text x="28" y="52" class="h ink">Memory</text><text x="28" y="88" class="p muted">session state</text></g>
  <g transform="translate(570 555)"><rect class="box" width="260" height="140" rx="18"/><text x="28" y="52" class="h ink">Tools</text><text x="28" y="88" class="p muted">skills + APIs</text></g>
  <g transform="translate(920 555)"><rect class="box" width="260" height="140" rx="18"/><text x="28" y="52" class="h ink">World</text><text x="28" y="88" class="p muted">files · browser</text></g>
</svg>
