<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Subagents skills and memory</title>
  <desc id="desc">Main agent delegates repository research and review while using skills and project memory.</desc>
  <defs><style>.bg{fill:#fffaf1}.ink{fill:#201d19}.muted{fill:#6e655b}.accent{fill:#c04a1a}.teal{fill:#2b8a8a}.box{fill:#f7f1e7;stroke:#201d19;stroke-width:3}.hot{fill:#ffe1cf;stroke:#c04a1a;stroke-width:3}.cool{fill:#dff3ef;stroke:#2b8a8a;stroke-width:3}.dark{fill:#15130f}.rev{fill:#fffaf1}.head{font:800 48px Inter,Arial,sans-serif}.h{font:800 31px Inter,Arial,sans-serif}.p{font:500 24px Inter,Arial,sans-serif}.mono{font:700 21px ui-monospace,SFMono-Regular,Menlo,monospace}.line{stroke:#201d19;stroke-width:4;fill:none;stroke-linecap:round}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#201d19"/></marker></defs>
  <rect class="bg" width="1400" height="720" rx="32"/>
  <text x="72" y="94" class="head ink">Subagents, skills и memory</text>
  <text x="74" y="140" class="p muted">главный агент держит задачу; subagents забирают детали</text>
  <g transform="translate(528 270)"><rect class="dark" width="344" height="180" rx="22"/><text x="34" y="76" class="h rev">Main agent</text><text x="34" y="122" class="p rev">routes work</text><text x="34" y="154" class="p rev">writes final answer</text></g>
  <path class="line" marker-end="url(#a)" d="M528 330H380"/><path class="line" marker-end="url(#a)" d="M528 410H380"/><path class="line" marker-end="url(#a)" d="M872 330h168"/><path class="line" marker-end="url(#a)" d="M872 410h168"/>
  <g transform="translate(96 250)"><rect class="cool" width="280" height="120" rx="18"/><text x="28" y="52" class="h ink">researcher</text><text x="28" y="88" class="p muted">inspect project</text></g>
  <g transform="translate(96 410)"><rect class="hot" width="260" height="120" rx="18"/><text x="28" y="52" class="h ink">reviewer</text><text x="28" y="88" class="p muted">find regressions</text></g>
  <g transform="translate(1044 250)"><rect class="box" width="260" height="120" rx="18"/><text x="28" y="52" class="h ink">AGENTS.md</text><text x="28" y="88" class="p muted">local rules</text></g>
  <g transform="translate(1044 410)"><rect class="box" width="260" height="120" rx="18"/><text x="28" y="52" class="h ink">skills/</text><text x="28" y="88" class="p muted">task playbooks</text></g>
</svg>
